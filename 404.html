<!DOCTYPE html>
<html lang="en">
<head>
<!-- GitHub Pages serves this file for missing URLs at any depth (e.g.
     /a/b/c), so relative asset paths would resolve against the bad URL's
     folder and 404, leaving the page unstyled. Anchor them to the site root
     with <base href="/"> — but ONLY when served over http(s). Opened directly
     from disk (file://), "/" would mean the drive root, so there we skip the
     base and let the relative paths resolve next to this file. -->
<script>if (location.protocol !== 'file:') { document.write('<base href="/">'); }</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Pat Leomi | Communication Coach - For Careers, AI & Beyond</title>
<meta name="description" content="That page couldn't be found. Here's the way back to Pat Leomi's site.">
<meta name="robots" content="noindex, noai, noimageai">
<link rel="icon" href="assets/images/site-icon-green.png">
<link rel="apple-touch-icon" href="assets/images/site-icon-green.png">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#44613B">
<link rel="preload" href="assets/fonts/Outfit/Outfit-VariableFont_wght.ttf" as="font" type="font/ttf" crossorigin>
<link rel="stylesheet" href="assets/css/main.css">
<script src="assets/js/components.js" defer></script>
<script src="assets/js/main.js" defer></script>
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>

<!-- ============================================================ -->
<!-- Navigation -->
<!-- ============================================================ -->
<div id="site-nav"></div>
<div id="site-breadcrumbs"></div>

<main id="main">

<!-- ============================================================ -->
<!-- 404 -->
<!-- ============================================================ -->
<section class="hero">
<div class="container narrow">
<p class="eyebrow eyebrow--clay">404</p>
<h1>This page isn't here.</h1>
<p class="lede">Either it moved, or the link that sent you here was off. Here's the way back to the site!</p>

<div class="hero-actions">
<a class="btn" href="index.html">Go Home</a>
<a class="btn btn--quiet" href="test.html">Test Your Knowledge</a>
<a class="btn btn--quiet" href="connect.html">Connect</a>
</div>

<p class="text-muted" style="margin-top: 2.5rem;">Followed a link that didn't work? Please let me know so I can fix it: <a href="mailto:pat@leomi.boston">pat@leomi.boston</a></p>
</div>
</section>

</main>

<!-- ============================================================ -->
<!-- Footer -->
<!-- ============================================================ -->
<div id="site-footer"></div>

<!-- With <base href="/"> the fragment-only skip link would resolve to the
     home page; repoint it to the current path so it stays on the 404. -->
<script>
  (function () {
    var s = document.querySelector('.skip-link');
    if (s) { s.setAttribute('href', location.pathname + '#main'); }
  })();
</script>

</body>
</html>
